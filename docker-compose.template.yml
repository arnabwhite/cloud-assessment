version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lovematch_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lovematch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: BACKEND_IMAGE
    container_name: lovematch_backend
    environment:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: lovematch
      DB_HOST: db
      PORT: 3001
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: FRONTEND_IMAGE
    container_name: lovematch_frontend
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: lovematch_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
