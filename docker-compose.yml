version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lovematch_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lovematch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lovematch_backend
    environment:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: lovematch
      DB_HOST: db
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lovematch_frontend
    environment:
      PUBLIC_API_URL: http://localhost:3001
    ports:
      - "4321:4321"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
